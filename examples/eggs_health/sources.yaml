# Eggs & Health Case Study — Source Registry
# FLF Epistemic Case Study Competition
#
# This case is "vague/open-ended" — "Are eggs good for you?" has no single answer.
# Test: can the system decompose a vague question into tractable sub-questions
# and detect when studies are asking DIFFERENT questions (framework mismatches)?

case_name: eggs_health
domain: nutrition and epidemiology
domain_facts:
  - One large egg contains about 186mg of cholesterol (all in the yolk)
  - Dietary cholesterol was previously thought to directly raise blood cholesterol
  - The 2015-2020 Dietary Guidelines removed the 300mg/day cholesterol limit
  - Observational studies can show correlation but not causation
  - Randomized controlled trials (RCTs) can show causation but in artificial conditions

questions:
  - "Are eggs good or bad for health?"
  - "Does egg consumption increase cardiovascular disease risk?"
  - "Why do observational studies and RCTs often reach different conclusions about eggs?"

