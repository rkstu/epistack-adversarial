# LHC Black Holes Case Study — Source Registry
# FLF Epistemic Case Study Competition
#
# This case is "settled science" — essentially no serious physicist believes
# the LHC will produce dangerous black holes. Test: can the system articulate
# WHY it's settled, map argument dependencies, and find the weakest speculative link?

case_name: lhc_black_holes
domain: particle physics and cosmology
domain_facts:
  - The Large Hadron Collider operates at energies up to 13 TeV
  - Cosmic rays hit Earth's atmosphere at far higher energies than the LHC produces
  - Hawking radiation is theoretically predicted but never observed
  - Micro black holes would require extra dimensions to form at LHC energies
  - The LHC has been operating since 2008 without incident

questions:
  - "Could the LHC create dangerous black holes that destroy the Earth?"
  - "What are the theoretical and observational reasons the LHC is safe?"
  - "What is the weakest link in the safety argument?"

