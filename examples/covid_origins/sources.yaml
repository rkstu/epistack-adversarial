# COVID-19 Origins Case Study — Source Registry
# FLF Epistemic Case Study Competition
#
# This case is "contested/evolving" — multiple strong positions with ongoing debate.
# The Rootclaim vs Peter Miller debate ($100K) provides a structured adversarial frame.

case_name: covid_origins
domain: virology and epidemiology
domain_facts:
  - SARS-CoV-2 was first identified in Wuhan, China in December 2019
  - The Huanan Seafood Market was linked to many early cases
  - The Wuhan Institute of Virology studies bat coronaviruses
  - Gain-of-function research involves modifying viruses to study their properties
  - Zoonotic spillover (natural origin) is the most common pathway for new human viruses

questions:
  - "What is the most likely origin of SARS-CoV-2?"
  - "Was the Huanan Seafood Market the site of initial spillover or a secondary amplification site?"
  - "Does the available evidence support or rule out a laboratory-associated incident?"

